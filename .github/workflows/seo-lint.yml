name: SEO Content Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  seo-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run SEO content lint
        run: node scripts/content-lint.js
